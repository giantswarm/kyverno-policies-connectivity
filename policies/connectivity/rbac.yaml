apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno-policies-connectivity-admission-controller
  labels:
    rbac.kyverno.io/aggregate-to-admission-controller: "true"
    [[- include "labels.common" $ | nindent 4 ]]
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "list", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno-policies-connectivity-background-controller
  labels:
    rbac.kyverno.io/aggregate-to-background-controller: "true"
    [[- include "labels.common" $ | nindent 4 ]]
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "list", "update", "delete"]
